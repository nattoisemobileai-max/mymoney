name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install and Build
        run: |
          npm install
          CI=false npm run build  # 加上 CI=false 確保編譯成功

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build # 這是編譯後 index.html 所在的資料夾
          branch: gh-pages
